<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리감독자 일일점검</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
      background:#f4f7ff;
      color:#0b1b3b;
    }
    header{
      background:linear-gradient(135deg,#003a7a,#004e91);
      color:#fff;
      padding:16px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    header h1{margin:0;font-size:18px}
    header button{
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.4);
      color:#fff;
      border-radius:20px;
      padding:6px 14px;
      cursor:pointer;
    }
    main{max-width:900px;margin:0 auto;padding:20px}

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,64,128,.12);
      padding:22px;
      margin-bottom:20px;
    }
    h2{margin:0 0 16px;font-size:18px}

    .input-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    label{
      font-size:14px;
      font-weight:800;
    }
    select,input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:2px solid #cdd9ff;
      font-size:15px;
    }
    .date-picker{text-align:center;border-color:#003a7a}

    .inspect-item{
      border-bottom:1px solid #e6ecff;
      padding:16px 0;
    }
    .inspect-title{
      font-weight:900;
      margin-bottom:6px;
    }
    .inspect-law{
      font-size:13px;
      color:#64748b;
      margin-bottom:10px;
    }
    .inspect-buttons{
      display:flex;
      gap:10px;
    }
    .inspect-buttons button{
      flex:1;
      padding:12px 0;
      border-radius:14px;
      border:2px solid #cdd9ff;
      background:#f8fbff;
      font-weight:900;
      cursor:pointer;
      position:relative;
      z-index:10;
    }
    .btn-good.active{background:#e6f7ee;border-color:#2ecc71;color:#1e824c}
    .btn-bad.active{background:#ffecec;border-color:#e74c3c;color:#b03024}
    .btn-na.active{background:#eef2f7;border-color:#94a3b8;color:#475569}

    .action-box{display:none;margin-top:10px}
    .action-box textarea{
      width:100%;
      min-height:70px;
      padding:10px;
      border-radius:10px;
      border:1px solid #e74c3c;
      background:#fff5f5;
    }

    textarea.general{
      width:100%;
      min-height:90px;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    /* 사진 */
    .photo-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .photo-hint{font-size:13px;color:#64748b;margin-top:8px}
    .preview{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }
    .preview .thumb{
      width:92px;
      height:92px;
      border-radius:12px;
      border:1px solid #dbe5ff;
      overflow:hidden;
      position:relative;
      background:#f8fbff;
    }
    .preview img{width:100%;height:100%;object-fit:cover;display:block}
    .preview .x{
      position:absolute;
      top:6px;right:6px;
      background:rgba(0,0,0,.55);
      color:#fff;
      border:none;
      border-radius:10px;
      padding:2px 8px;
      cursor:pointer;
      font-weight:800;
    }

    .submit-btn{
      width:100%;
      padding:20px;
      background:linear-gradient(135deg,#003a7a,#0053a0);
      color:#fff;
      border:none;
      border-radius:16px;
      font-size:19px;
      font-weight:900;
      cursor:pointer;
      position:relative;
      z-index:20;
    }

    .submit-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    footer{
      text-align:center;
      font-size:13px;
      color:#666;
      padding:20px;
    }
  </style>
</head>

<body>
<header>
  <h1>🏗 관리감독자 일일점검</h1>
  <button onclick="location.href='index.html'">🏠 홈</button>
</header>

<main>
  <!-- ================= 점검 입력 ================= -->
  <div id="formSection">

    <div class="card">
      <h2>🧾 점검 기본정보</h2>
      <div class="input-grid">
        <div>
          <label>📍 현장명</label>
          <select id="siteName">
            <option value="">선택</option>
            <option>파주pmc</option>
            <option>울산태화강</option>
            <option>울산우정동</option>
            <option>여수</option>
            <option>마포로3-1</option>
            <option>강변역아이파크</option>
            <option>의왕고천나구역</option>
            <option>양평 덕평지구</option>
            <option>김해사이언스파크</option>
          </select>
        </div>
        <div>
          <label>👷 점검자</label>
          <input id="inspector" placeholder="이름 입력">
        </div>
        <div style="grid-column:1/3">
          <label>📅 점검 날짜</label>
          <input id="checkDate" class="date-picker">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📋 법정 점검항목</h2>
      <div id="inspectList"></div>
    </div>

    <div class="card">
      <h2>📝 기타 특이사항</h2>
      <textarea id="generalNote" class="general"></textarea>
    </div>

    <!-- ✅ 사진 첨부 카드 -->
    <div class="card">
      <h2>📷 점검 사진 첨부</h2>
      <div class="photo-row">
        <input type="file" id="photoInput" accept="image/*" multiple>
      </div>
      <div class="photo-hint">
        • 사진은 자동으로 용량을 줄여 업로드됩니다(긴 변 1280px, JPEG 압축).<br>
        • 필요 없는 사진은 미리보기에서 X로 제거하세요.
      </div>
      <div id="photoPreview" class="preview"></div>
    </div>

    <button id="submitBtn" class="submit-btn" onclick="submitInspection()">✅ 점검 제출</button>
  </div>

  <!-- ================= 완료 화면 ================= -->
  <div id="completeSection" style="display:none;">
    <div class="card" style="text-align:center;">
      <h2>✅ 점검이 완료되었습니다</h2>
      <p style="color:#555;margin-top:10px">
        점검 결과가 정상적으로 저장되었으며<br>
        본사 관리자 대시보드에 즉시 반영됩니다.
      </p>
      <div style="margin-top:30px">
        <button class="submit-btn" onclick="location.href='index.html'">🏠 홈</button>
        <button class="submit-btn" style="margin-top:12px;background:#1e40af"
                onclick="location.href='dashboard.html'">📊 관리자 대시보드</button>
      </div>
    </div>
  </div>
</main>

<footer>
  동진토건(주) 안전관리팀<br>
  © 2026 Dongjin Construction
</footer>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

<script>
  flatpickr("#checkDate",{dateFormat:"Y-m-d",locale:"ko",defaultDate:new Date()});

  const items=[
    ["1","제15조 1호","기계·기구·설비 안전보건점검"],
    ["2","제15조 2호","작업복·보호구 점검 및 착용 교육지도"],
    ["3","제15조 2호","방호장치 점검"],
    ["4","제15조 3호","산업재해 발생 확인"],
    ["5","제15조 4호","작업장 정리정돈"],
    ["6","제15조 4호","통로 확보 상태"],
    ["7","제15조 5호","안전·보건관리자 지도 협조"],
    ["8","제15조 6호","위험성평가 참여"]
  ];

  const list=document.getElementById("inspectList");
  items.forEach(([order,law,title])=>{
    const div=document.createElement("div");
    div.className="inspect-item";
    div.dataset.order=order;
    div.dataset.law=law;
    div.dataset.title=title;
    div.innerHTML=`
      <div class="inspect-title">${order}. ${title}</div>
      <div class="inspect-law">${law}</div>
      <div class="inspect-buttons">
        <button type="button" class="btn-good">양호</button>
        <button type="button" class="btn-bad">미흡</button>
        <button type="button" class="btn-na">해당없음</button>
      </div>
      <div class="action-box">
        <textarea placeholder="미흡 시 조치내용 입력"></textarea>
      </div>
    `;
    list.appendChild(div);

    const buttons=div.querySelectorAll("button");
    const actionBox=div.querySelector(".action-box");
    const ta=actionBox.querySelector("textarea");

    buttons.forEach(btn=>{
      btn.onclick=()=>{
        buttons.forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        if(btn.classList.contains("btn-bad")){
          actionBox.style.display="block";
          ta.focus();
        }else{
          actionBox.style.display="none";
          ta.value="";
        }
      };
    });
  });
</script>

<!-- Firebase SDK (compat version - 전역 window 접근 가능) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- ✅ Storage 추가 -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig={
    apiKey:"AIzaSyCngSCR-cxvRKmorbrfmjQd7c2CbEK1fJM",
    authDomain:"dj-supervisor-check.firebaseapp.com",
    projectId:"dj-supervisor-check",
    storageBucket:"dj-supervisor-check.firebasestorage.app",
    messagingSenderId:"252979849342",
    appId:"1:252979849342:web:621b6212a3223f89bbd02f"
  };

  firebase.initializeApp(firebaseConfig);
  const db=firebase.firestore();
  const storage=firebase.storage();

  /* =========================
     사진 선택/미리보기/삭제
  ========================= */
  let selectedFiles = []; // File 객체를 관리(삭제 가능하게)

  const photoInput = document.getElementById("photoInput");
  const photoPreview = document.getElementById("photoPreview");

  photoInput.addEventListener("change", () => {
    // 새로 선택된 파일들을 기존 배열에 누적
    const newFiles = Array.from(photoInput.files || []);
    if(newFiles.length){
      selectedFiles = selectedFiles.concat(newFiles);
      renderPreview();
    }
    // 같은 파일 다시 선택 가능하게 input 초기화
    photoInput.value = "";
  });

  function renderPreview(){
    photoPreview.innerHTML = "";
    selectedFiles.forEach((file, idx)=>{
      const url = URL.createObjectURL(file);
      const box = document.createElement("div");
      box.className = "thumb";
      box.innerHTML = `
        <img src="${url}" alt="preview">
        <button class="x" type="button">X</button>
      `;
      box.querySelector(".x").onclick = () => {
        selectedFiles.splice(idx,1);
        renderPreview();
      };
      photoPreview.appendChild(box);
    });
  }

  /* =========================
     이미지 압축(리사이즈+JPEG)
     - 긴 변 1280px
     - quality 0.72
  ========================= */
  async function compressImageToJpeg(file, maxSize=1280, quality=0.72){
    // HEIC 등 일부 포맷은 브라우저에서 로딩이 안 될 수 있어요(아이폰)
    // 그 경우 "지원되지 않는 파일" 경고가 뜰 수 있습니다.
    const dataURL = await readAsDataURL(file);
    const img = await loadImage(dataURL);

    const {width, height} = fitSize(img.width, img.height, maxSize);

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, width, height);

    const blob = await canvasToBlob(canvas, "image/jpeg", quality);
    return blob; // JPEG Blob
  }

  function readAsDataURL(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function loadImage(src){
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function fitSize(w,h,maxSize){
    // 긴 변 기준으로 줄이기
    const longSide = Math.max(w,h);
    if(longSide <= maxSize) return {width:w, height:h};
    const scale = maxSize / longSide;
    return {width: Math.round(w*scale), height: Math.round(h*scale)};
  }

  function canvasToBlob(canvas, type, quality){
    return new Promise((resolve)=>{
      canvas.toBlob((blob)=>resolve(blob), type, quality);
    });
  }

  /* =========================
     Storage 업로드 → URL 목록
  ========================= */
  async function uploadCompressedPhotos({site, date, inspector}){
    const urls = [];

    for(const file of selectedFiles){
      // 압축
      const jpegBlob = await compressImageToJpeg(file, 1280, 0.72);

      // 파일명 안전하게 만들기
      const safeName = (file.name || "photo")
        .replace(/\s+/g,"_")
        .replace(/[^\w.\-가-힣]/g,"");

      const path = `inspectionPhotos/${site}/${date}/${Date.now()}_${Math.random().toString(16).slice(2)}_${safeName}.jpg`;

      const ref = storage.ref().child(path);

      // 메타데이터(선택)
      const metadata = {
        contentType: "image/jpeg",
        customMetadata: {
          site,
          date,
          inspector
        }
      };

      const snap = await ref.put(jpegBlob, metadata);
      const url = await snap.ref.getDownloadURL();
      urls.push(url);
    }

    return urls;
  }

  /* =========================
     제출
  ========================= */
  async function submitInspection(){
    const submitBtn = document.getElementById("submitBtn");
    const site=document.getElementById("siteName").value;
    const inspector=document.getElementById("inspector").value.trim();
    const date=document.getElementById("checkDate").value;

    if(!site||!inspector){alert("현장명과 점검자를 입력하세요.");return;}
    if(!date){alert("점검 날짜를 선택하세요.");return;}

    const inspections=[];
    let allAnswered=true;
    let hasActionMissing=false;

    document.querySelectorAll(".inspect-item").forEach(item=>{
      const active=item.querySelector("button.active");
      const action=item.querySelector(".action-box textarea").value.trim();
      let result="";

      if(active){
        if(active.classList.contains("btn-good")) result="good";
        else if(active.classList.contains("btn-bad")){
          result="bad";
          if(action==="") hasActionMissing=true;
        }else result="na";
      } else {
        allAnswered=false;
      }

      inspections.push({
        order:item.dataset.order,
        law:item.dataset.law,
        title:item.dataset.title,
        result,
        action
      });
    });

    if(!allAnswered){
      alert("모든 점검 항목에 결과를 선택해주세요.");
      return;
    }
    if(hasActionMissing){
      alert("미흡 항목의 조치내용을 모두 입력해야 합니다.");
      return;
    }

    try{
      submitBtn.disabled = true;
      submitBtn.textContent = "⏳ 저장 중...";

      // ✅ 사진 업로드(선택)
      let photoUrls = [];
      if(selectedFiles.length > 0){
        submitBtn.textContent = "⏳ 사진 업로드 중...";
        photoUrls = await uploadCompressedPhotos({site, date, inspector});
      }

      // ✅ Firestore 저장
      submitBtn.textContent = "⏳ 점검 저장 중...";
      await db.collection("dailyInspections").add({
        company:"동진토건(주)",
        siteName:site,
        inspector,
        date,
        inspections,
        generalNote:document.getElementById("generalNote").value,
        photos: photoUrls,               // ✅ 여기!
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });

      document.getElementById("formSection").style.display="none";
      document.getElementById("completeSection").style.display="block";

    }catch(e){
      console.error("저장 오류:",e);
      alert("저장 중 오류가 발생했습니다. 다시 시도해주세요.\n오류: "+e.message);
      submitBtn.disabled = false;
      submitBtn.textContent = "✅ 점검 제출";
    }
  }

  window.submitInspection=submitInspection;
</script>

</body>
</html>
