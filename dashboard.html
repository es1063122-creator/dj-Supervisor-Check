<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본사 관리자 대시보드 | 동진토건</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
background:#f4f7ff;
color:#0b1b3b;
}

header{
background:linear-gradient(135deg,#1e3a8a,#1e40af);
color:#fff;
padding:18px 24px;
}

header h1{
margin:0;
font-size:20px;
}

main{
max-width:1300px;
margin:0 auto;
padding:24px;
}

.card{
background:#fff;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,64,128,.12);
padding:20px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px 10px;
border-bottom:1px solid #e6ecff;
font-size:14px;
}

th{
background:#f1f5ff;
font-weight:800;
}

.bad{
color:#b91c1c;
font-weight:800;
}

.good{
color:#15803d;
font-weight:700;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

button:hover{
background:#1e40af;
}

.details{
display:none;
background:#f8fafc;
padding:12px;
border-left:4px solid #2563eb;
width:100%;
}

canvas{
max-height:320px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
gap:20px;
}

@media(max-width:768px){

table{
font-size:13px;
}

th,td{
padding:8px;
}

}

</style>
</head>

<body>

<header>
<h1>📊 동진토건 본사 관리자 대시보드</h1>
</header>

<main>

<div class="card">
<h2>📋 점검 현황</h2>

<table id="table">

<thead>
<tr>
<th>점검일</th>
<th>현장</th>
<th>점검자</th>
<th>미흡</th>
<th>PDF</th>
<th>상세</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<div class="grid">

<div class="card">
<h3>📍 현장별 미흡 건수</h3>
<canvas id="siteChart"></canvas>
</div>

<div class="card">
<h3>📅 월별 점검 건수</h3>
<canvas id="monthChart"></canvas>
</div>

<div class="card">
<h3>👷 점검자별 점검 횟수</h3>
<canvas id="inspectorChart"></canvas>
</div>

</div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCngSCR-cxvRKmorbrfmjQd7c2CbEK1fJM",
authDomain:"dj-supervisor-check.firebaseapp.com",
projectId:"dj-supervisor-check",
storageBucket:"dj-supervisor-check.firebasestorage.app",
messagingSenderId:"252979849342",
appId:"1:252979849342:web:621b6212a3223f89bbd02f"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const tbody=document.querySelector("#table tbody");

const siteStat={};
const monthStat={};
const inspectorStat={};

let allDocs=[];

async function loadData(){

const snap=await db.collection("dailyInspections")
.orderBy("createdAt","desc")
.get();

allDocs=snap.docs;

snap.docs.forEach((doc,i)=>{

const d=doc.data();

const bad=d.inspections.filter(x=>x.result==="bad");

siteStat[d.siteName]=(siteStat[d.siteName]||0)+bad.length;

const m=d.date?.slice(0,7);
if(m) monthStat[m]=(monthStat[m]||0)+1;

inspectorStat[d.inspector]=(inspectorStat[d.inspector]||0)+1;

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.date}</td>
<td>${d.siteName}</td>
<td>${d.inspector}</td>
<td class="${bad.length?"bad":"good"}">${bad.length||"없음"}</td>
<td><button onclick="makePDF(${i})">PDF</button></td>
<td><button onclick="toggleRow(this)">보기</button></td>
`;

tbody.appendChild(tr);

const detail=document.createElement("tr");

detail.innerHTML=`
<td colspan="6">
<div class="details">

${
bad.length
? bad.map(b=>`<p><strong>${b.title}</strong><br>조치: ${b.action}</p>`).join("")
: "<p>미흡 없음</p>"
}

${d.generalNote?`<hr><p><strong>기타 특이사항</strong><br>${d.generalNote}</p>`:""}

</div>
</td>
`;

tbody.appendChild(detail);

});

drawCharts();

}

function toggleRow(btn){

const tr=btn.closest("tr");
const next=tr.nextElementSibling;
const detail=next.querySelector(".details");

if(detail.style.display==="block"){
detail.style.display="none";
}else{
detail.style.display="block";
}

}

function drawCharts(){

new Chart(document.getElementById("siteChart"),{

type:"bar",

data:{
labels:Object.keys(siteStat),
datasets:[{
label:"미흡 건수",
data:Object.values(siteStat),
backgroundColor:"#ef4444"
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

});

new Chart(document.getElementById("monthChart"),{

type:"line",

data:{
labels:Object.keys(monthStat),
datasets:[{
label:"점검 건수",
data:Object.values(monthStat),
borderColor:"#3b82f6",
fill:false
}]
},

options:{
responsive:true
}

});

new Chart(document.getElementById("inspectorChart"),{

type:"bar",

data:{
labels:Object.keys(inspectorStat),
datasets:[{
label:"점검 횟수",
data:Object.values(inspectorStat),
backgroundColor:"#22c55e"
}]
},

options:{
responsive:true,
plugins:{legend:{display:false}}
}

});

}

window.makePDF=idx=>{

const data=allDocs[idx].data();

const rows=data.inspections.map(it=>`

<tr>

<td style="padding:8px;border-bottom:1px solid #ddd">
${it.order}. ${it.title}
</td>

<td style="padding:8px;text-align:center;border-bottom:1px solid #ddd">

${it.result==="good"?"✅ 양호":it.result==="bad"?"❌ 미흡":"-"}

</td>

<td style="padding:8px;border-bottom:1px solid #ddd">

${it.result==="bad"?it.action:""}

</td>

</tr>

`).join("");

const html=`

<div style="font-family:'Noto Sans KR';padding:40px">

<h2>관리감독자 일일점검 결과</h2>

<p>현장 : ${data.siteName}</p>
<p>점검자 : ${data.inspector}</p>
<p>점검일 : ${data.date}</p>

<table style="width:100%;border-collapse:collapse;margin-top:20px">

<tr style="background:#1e3a8a;color:#fff">
<th>점검항목</th>
<th>결과</th>
<th>조치</th>
</tr>

${rows}

</table>

</div>
`;

const container=document.createElement("div");
container.innerHTML=html;

document.body.appendChild(container);

html2pdf().set({
margin:10,
filename:`${data.siteName}_${data.date}.pdf`,
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
}).from(container).save().then(()=>{
document.body.removeChild(container);
});

};

loadData();

</script>

</body>
</html>
