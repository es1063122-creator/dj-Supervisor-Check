<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동진토건 관리감독자 일일점검</title>

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #0a2a4f 0%, #003a7a 45%, #195cc8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 22px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #003a7a, #004e91);
      color: #fff;
      padding: 42px 30px;
      text-align: center;
      position: relative;
    }

    .home-btn {
      position: absolute;
      top: 15px;
      right: 18px;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
    }

    .logo {
      width: 140px;
      margin-bottom: 14px;
    }

    .content {
      padding: 30px;
    }

    .welcome {
      text-align: center;
      margin-bottom: 25px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 12px;
      margin-bottom: 25px;
    }

    .stat-box {
      background: #eef1f5;
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      font-size: 14px;
    }

    .legal-notice {
      background: #fff8e6;
      border-left: 4px solid #ff9800;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 22px;
    }

    .date-box {
      margin-bottom: 24px;
    }

    .date-picker {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 2px solid #003a7a;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 14px;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #003a7a;
      color: #fff;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #555;
      padding: 18px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <button class="home-btn" onclick="goHome()">🏠 홈</button>

    <img src="https://raw.githubusercontent.com/es1063122-creator/djweb/main/djlogo.png"
         class="logo" alt="동진토건 로고">

    <h2>🏗 관리감독자 일일점검</h2>
    <p>산업안전보건법 제16조 법정 의무</p>
  </div>

  <div class="content">
    <div class="welcome">
      <h3>안녕하세요, 관리감독자님</h3>
      <p>오늘도 안전한 현장을 만들어 주세요.</p>
    </div>

    <div class="stats">
      <div class="stat-box">점검항목<br><strong>10개</strong></div>
      <div class="stat-box">소요시간<br><strong>3분</strong></div>
      <div class="stat-box">법정의무<br><strong>필수</strong></div>
    </div>

    <div class="legal-notice">
      관리감독자는 매일 작업 전 현장 점검을 실시하고 기록을 유지해야 합니다.
    </div>

    <div class="date-box">
      <label><strong>📅 점검 날짜</strong></label>
      <input type="text" id="checkDate" class="date-picker" placeholder="날짜 선택">
    </div>

    <button class="btn-primary" onclick="submitInspection()">📝 점검 제출</button>
  </div>

  <div class="footer">
    <strong>동진토건(주) 안전관리팀</strong><br>
    © 2026 Dongjin Construction
  </div>

</div>

<!-- Flatpickr -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

<script>
  flatpickr("#checkDate", {
    dateFormat: "Y-m-d",
    locale: "ko",
    defaultDate: new Date()
  });

  function goHome() {
    location.href = "https://es1063122-creator.github.io/dj-safty-portal/";
  }
</script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCngSCR-cxvRKmorbrfmjQd7c2CbEK1fJM",
    authDomain: "dj-supervisor-check.firebaseapp.com",
    projectId: "dj-supervisor-check",
    storageBucket: "dj-supervisor-check.firebasestorage.app",
    messagingSenderId: "252979849342",
    appId: "1:252979849342:web:621b6212a3223f89bbd02f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.submitInspection = async function () {
    const date = document.getElementById("checkDate").value;
    if (!date) {
      alert("점검 날짜를 선택하세요.");
      return;
    }

    await addDoc(collection(db, "dailyInspections"), {
      company: "동진토건(주)",
      siteName: "파주 ○○현장",
      inspector: "관리감독자",
      date: date,
      createdAt: serverTimestamp()
    });

    alert("✅ 점검이 정상적으로 저장되었습니다.");
  };
</script>

</body>
</html>
