<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동진토건 관리감독자 일일점검</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:linear-gradient(135deg,#0a2a4f 0%,#003a7a 45%,#195cc8 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:#0b1b3b;
}

.container{
  background:#fff;
  border-radius:22px;
  max-width:480px;
  width:100%;
  box-shadow:0 18px 60px rgba(0,0,0,.3);
  overflow:hidden;
  animation:slideUp .6s ease-out;
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(25px)}
  to{opacity:1;transform:translateY(0)}
}

.header{
  background:linear-gradient(135deg,#003a7a,#004e91);
  padding:44px 28px 38px;
  text-align:center;
  color:#fff;
}

.logo{
  width:140px;
  margin-bottom:16px;
}

.header h1{
  font-size:24px;
  margin:0 0 6px;
  font-weight:800;
}
.header p{
  font-size:14px;
  opacity:.9;
}

.content{
  padding:36px 28px;
  text-align:center;
}

.welcome h2{
  font-size:20px;
  margin-bottom:6px;
}
.welcome p{
  font-size:14px;
  color:#555;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:26px 0;
}
.stat-box{
  background:#eef2ff;
  border-radius:14px;
  padding:16px 8px;
}
.stat-number{
  font-size:18px;
  font-weight:900;
}
.stat-label{
  font-size:12px;
  color:#555;
}

.notice{
  background:#fff8e6;
  border-left:4px solid #ff9800;
  padding:14px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:26px;
  text-align:left;
}

.btn-primary{
  width:100%;
  padding:18px;
  border-radius:14px;
  background:#003a7a;
  color:#fff;
  border:none;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.btn-secondary{
  width:100%;
  padding:16px;
  border-radius:14px;
  background:#fff;
  color:#003a7a;
  border:2px solid #003a7a;
  font-size:15px;
  font-weight:800;
  margin-top:12px;
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:13px;
  color:#666;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img
      src="https://raw.githubusercontent.com/es1063122-creator/djweb/main/djlogo.png"
      class="logo"
      alt="동진토건 로고">
    <h1>관리감독자 일일점검</h1>
    <p>산업안전보건법 시행령 제15조</p>
  </div>

  <div class="content">

    <div class="welcome">
      <h2>안전한 현장은 점검에서 시작됩니다</h2>
      <p>오늘의 현장 안전점검을 진행해주세요.</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-number">8</div>
        <div class="stat-label">법정 점검항목</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">3분</div>
        <div class="stat-label">소요 시간</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">의무</div>
        <div class="stat-label">법정 점검</div>
      </div>
    </div>

    <div class="notice">
      <strong>📢 법적 의무 안내</strong><br>
      관리감독자는 매일 작업 전·중 현장 점검을 실시하고
      점검 결과를 기록·보존해야 합니다.
    </div>

    <!-- 🔥 핵심 버튼 -->
    <button class="btn-primary" onclick="goToCheck()">
      📝 점검하러 가기
    </button>

    <button class="btn-secondary" onclick="goToDashboard()">
      📊 본사 관리자 대시보드
    </button>

  </div>

  <div class="footer">
    <strong>동진토건(주) 안전관리팀</strong><br>
    <strong>KDH-safety</strong><br>
    © 2026 Dongjin Construction
  </div>

</div>

<script>
function goToCheck(){
  window.location.href = "check.html";
}

function goToDashboard(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
